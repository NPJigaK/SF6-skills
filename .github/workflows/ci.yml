name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.15"
          enable-cache: "false"

      - name: Lockfile check
        run: uv lock --check

      - name: Scrapling import check
        run: PYTHONPATH=src uv run --locked python -c "from scrapling.fetchers import Fetcher, StealthyFetcher; print(Fetcher.__name__, StealthyFetcher.__name__)"

      - name: Unit tests
        run: PYTHONPATH=src uv run --locked python -m unittest discover -s tests

      - name: Clean-slate validator
        run: PYTHONPATH=src uv run --locked python tests/validation/validate_clean_slate.py

      - name: Current-fact CLI smoke
        run: PYTHONPATH=src uv run --locked python -m sf6_knowledge_coach.cli answer prepare "JPの5LPはガードで何F？"

      - name: Acquisition report validation
        run: PYTHONPATH=src uv run --locked python -m sf6_knowledge_coach.source_acquisition validate-report docs/acquisition-reports/20260521T025403Z-current-source-acquisition.md

      - name: Whitespace check
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags origin "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
