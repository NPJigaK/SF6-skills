name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Clean-slate validator
        run: PYTHONPATH=src python tests/validation/validate_clean_slate.py

      - name: Current-fact CLI smoke
        run: PYTHONPATH=src python -m sf6_knowledge_coach.cli answer prepare "JPの5LPはガードで何F？"

      - name: Whitespace check
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags origin "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
