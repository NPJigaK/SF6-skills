name: v2 validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    name: Run v2 validation suite
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run validation
        shell: powershell
        run: .\tests\validation\run-all.ps1
